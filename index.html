<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenBeads - Premium Oriental Buddhist Bracelets</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap');
        .font-oriental { font-family: 'Cinzel', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fcfaf7] font-sans text-gray-800">
    <nav class="bg-[#1c1611] text-[#e6dfd3] sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-gopuram text-2xl text-[#d4af37]"></i>
                <span class="font-oriental text-2xl font-bold tracking-widest text-[#d4af37]">ZenBeads</span>
            </div>
            <div class="relative cursor-pointer py-2 px-4 bg-[#2d241d] rounded-full" onclick="alert('Cart System Active')">
                <i class="fa-solid fa-shopping-bag text-lg text-[#d4af37]"></i>
            </div>
        </div>
    </nav>
    <header class="relative bg-[#2d241d] text-center py-20 px-4">
        <h1 class="font-oriental text-4xl font-bold text-[#e6dfd3] mb-4">Eastern Mindfulness</h1>
        <p class="text-gray-300 text-sm">Premium Buddhist prayer beads for global collectors.</p>
    </header>
    <main class="max-w-7xl mx-auto px-4 py-16 text-center">
        <h2 class="font-oriental text-2xl mb-8">Masterpieces Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100">
                <div class="aspect-square bg-gray-100 mb-4 rounded flex items-center justify-center text-gray-400">Product Image</div>
                <h3 class="font-bold">Hainan Agarwood Bracelet</h3>
                <p class="text-sm text-gray-500 my-2">$588.00</p>
                <button class="w-full bg-[#1c1611] text-[#d4af37] py-2 rounded font-bold">BUY NOW</button>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100">
                <div class="aspect-square bg-gray-100 mb-4 rounded flex items-center justify-center text-gray-400">Product Image</div>
                <h3 class="font-bold">Red Sandalwood Beads</h3>
                <p class="text-sm text-gray-500 my-2">$299.00</p>
                <button class="w-full bg-[#1c1611] text-[#d4af37] py-2 rounded font-bold">BUY NOW</button>
            </div>
        </div>
    </main>
</body>
</html>
